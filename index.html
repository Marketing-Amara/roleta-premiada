<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roleta Premiada</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#1b237e;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    color:white;
    overflow:hidden;
}

.topbar{
    width:100%;
    padding:20px;
    display:flex;
    justify-content:flex-start;
}

button{
    background:#ffffff;
    border:none;
    padding:12px 25px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    color:#333;
    font-size:16px;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

.container{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
}

h1{
    font-size:50px;
    text-align:center;
    line-height:1.1;
}

.wheel-wrapper{
    position:relative;
    width:650px;
    height:650px;
}

.pointer{
    width:0;
    height:0;
    border-left:30px solid transparent;
    border-right:30px solid transparent;
    border-top:60px solid #fff;
    position:absolute;
    top:-10px;
    left:50%;
    transform:translateX(-50%);
    z-index:10;
}

.wheel{
    width:100%;
    height:100%;
    border-radius:50%;
    border:15px solid #fff;
    position:relative;
    overflow:hidden;
    transition:transform 5s cubic-bezier(0.17, 0.67, 0.12, 0.99);
}

.center{
    position:absolute;
    width:220px;
    height:220px;
    background:white;
    border-radius:50%;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    z-index:5;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:10px;
    border:10px solid #1b237e;
}

.center img{
    max-width:140px;
    object-fit:contain;
}

.label{
    position:absolute;
    width:170px;
    left:50%;
    top:50%;
    transform-origin:0 0;
    color:white;
    font-weight:bold;
    font-size:15px;
    text-align:center;
    text-shadow:1px 1px 2px rgba(0,0,0,0.4);
}

.result{
    margin-top:20px;
    font-size:26px;
    font-weight:bold;
    text-align:center;
}

</style>
</head>

<body>

<div class="topbar">
    <button onclick="editarPremios()">Alterar</button>
</div>

<div class="container">

    <h1>
        Fechou?<br>
        Rode a roleta!
    </h1>

    <div class="wheel-wrapper">

        <div class="pointer"></div>

        <div class="wheel" id="wheel"></div>

        <div class="center">
            <!-- LOGO AMARA -->
            <img src="amara.png" alt="Amara">

            <!-- LOGO GUANAMBI -->
            <img src="guanambi.png" alt="Guanambi">
        </div>

    </div>

    <button onclick="girar()">GIRAR ROLETA</button>

    <div class="result" id="resultado"></div>

</div>

<script>

let premios = JSON.parse(localStorage.getItem('premios')) || [

    "2 Últimas Parcelas Pagas",
    "JBL Caixa de Som",
    "R$ 300 PARA GASTAR NA EXPO",
    "Lavadora WAP de Alta Pressão",
    "R$ 300 PARA GASTAR NA EXPO",
    "Vale de R$ 500",
    "R$ 400 PARA GASTAR NA EXPO",
    "Cafeteira",
    "Última Parcela Paga",
    "Panela de Pressão Elétrica",
    "R$ 200 PARA GASTAR NA EXPO",
    "Ar Condicionado 12 Mil BTUs",
    "R$ 300 PARA GASTAR NA EXPO",
    "Air Fryer Mondial 12L",
    "GIRE NOVAMENTE!",
    "R$ 100,00",
    "R$ 100,00"

];

const cores = [
    "#ef4444",
    "#0f766e",
    "#f59e0b",
    "#7c3aed",
    "#f97316",
    "#ca8a04",
    "#84cc16",
    "#ec4899",
    "#f97316",
    "#06b6d4",
    "#7e22ce",
    "#16a34a",
    "#2563eb",
    "#db2777",
    "#0f172a",
    "#65a30d",
    "#22c55e"
];

const wheel = document.getElementById("wheel");

function renderizarRoleta(){

    wheel.innerHTML = "";

    const total = premios.length;
    const angulo = 360 / total;

    let gradient = "";

    premios.forEach((_, i) => {

        const inicio = i * angulo;
        const fim = inicio + angulo;

        gradient += `${cores[i % cores.length]} ${inicio}deg ${fim}deg`;

        if(i < total - 1){
            gradient += ",";
        }

    });

    wheel.style.background = `conic-gradient(${gradient})`;

    premios.forEach((premio, i) => {

        const label = document.createElement("div");

        label.className = "label";

        label.style.transform =
            `rotate(${angulo * i + angulo/2}deg)
             translate(230px)
             rotate(90deg)`;

        label.innerHTML = premio;

        wheel.appendChild(label);

    });

}

renderizarRoleta();

let girando = false;
let rotacao = 0;

function girar(){

    if(girando || premios.length === 0) return;

    girando = true;

    const indice = Math.floor(Math.random() * premios.length);

    const premio = premios[indice];

    const angulo = 360 / premios.length;

    const parada =
        (360 * 6) +
        (360 - (indice * angulo) - angulo / 2);

    rotacao += parada;

    wheel.style.transform = `rotate(${rotacao}deg)`;

    setTimeout(() => {

        document.getElementById("resultado").innerHTML =
            "🎉 Resultado: " + premio;

        // REMOVE O PRÊMIO APÓS SAIR
        premios.splice(indice, 1);

        // SALVA
        localStorage.setItem(
            'premios',
            JSON.stringify(premios)
        );

        renderizarRoleta();

        girando = false;

    }, 5200);

}

function editarPremios(){

    const listaAtual = premios.join("\n");

    const novaLista = prompt(
`Edite os prêmios abaixo (1 por linha):`,
listaAtual
    );

    if(novaLista !== null){

        premios = novaLista
            .split("\n")
            .map(p => p.trim())
            .filter(p => p !== "");

        localStorage.setItem(
            'premios',
            JSON.stringify(premios)
        );

        renderizarRoleta();

    }

}

</script>

</body>
</html>
