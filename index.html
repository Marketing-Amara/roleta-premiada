  <style>
@import url("https://fonts.googleapis.com/css?family=Material+Icons|Work+Sans:400,700,900");
body { overflow: hidden; }
.roulette {
  font-family: "Work Sans", sans-serif;
  display: block; position: absolute;
  width: 400px; height: 400px;
  top: 50%; left: 50%;
  margin-top: -200px; margin-left: -200px;
}
.roulette .shadow {
  display: block; position: absolute;
  top:0;left:0;right:0;bottom:0;
  border-radius: 50%;
  box-shadow: 0 0.3em 0 rgba(0,0,0,0.25);
}
.roulette .markers {
  display: block; position: absolute;
  top:-1px;left:-1px;right:-1px;bottom:-1px;
  overflow: hidden; border-radius: 100%;
}
.roulette .markers .marker {
  position: absolute; width:0; height:0;
  top:-200px; left:200px;
  transform-origin: 0% 400px;
  border: 0 solid transparent;
}
.roulette .markers .triangle {
  width:0; height:0;
  border-style: solid;
  border-width: 1em 0 1em 1em;
  border-color: transparent transparent transparent #007bff;
  position: absolute;
  border-left-color: #fff;
  top:50%; left:-1px; margin-top:-1em;
  filter: drop-shadow(0 0.25em 0 rgba(0,0,0,0.25));
}
.roulette .spinner {
  display: block; position: absolute;
  top:0;left:0;right:0;bottom:0;
  border-radius: 50%; overflow: hidden;
  transform: rotateZ(0deg);
  -webkit-backface-visibility: hidden; backface-visibility: hidden;
}
.roulette .spinner .item {
  position: absolute; width:0; height:0;
  top:-200px; left:200px;
  transform-origin: 0% 400px;
  border: 0 solid transparent;
}
.roulette .spinner .item .label {
  display: block; position: absolute;
  color: #fff; font-weight: 800;
  top:0; left:0; white-space: nowrap;
  transform-origin: 0 0; font-size: 0.8em;
}
.roulette .spinner .item .label i,
.roulette .spinner .item .label .text {
  display: inline-block; vertical-align: middle;
  line-height: 1; font-size: 1em; text-indent: 0;
}
.roulette .spinner .item .label i { margin-right: 0.1em; }
.roulette .button {
  width:10em; height:10em; line-height:10em;
  top:50%; left:50%; margin-left:-5em; margin-top:-5em;
  font-weight:800; z-index:9; position:absolute;
  background:#fff; border:none; border-radius:100%;
  color:#999; outline:none; cursor:pointer;
  -webkit-user-select:none; -moz-user-select:none; user-select:none;
  box-shadow: 0 0.4em 0 rgba(0,0,0,0.25);
  text-align:center;
  transition: transform 0.15s;
  transition-timing-function: cubic-bezier(0.68,-0.55,0.265,1.55);
  display:flex; align-items:center; justify-content:center;
}
.roulette .button:hover { color: inherit; }
.roulette .button span { font-size:1.6em; letter-spacing:-0.05em; }
.roulette.busy .button {
  transform: scale(0.9);
  box-shadow: 0 0.15em 0 rgba(0,0,0,0.25);
  color:#999; cursor:default;
}
/* Labels */
.roulette .spinner .item .label .text {
  font-size:0.6em; white-space:initial;
  width:2.5rem; text-align:center;
  line-height:1.2; word-wrap:break-word;
}
.roulette .spinner .item .label i { font-size:12px; }
.swal2-confirm { background-color: #00953b !important; }
.swal2-confirm:focus { box-shadow: 0 0 0 3px rgba(0,149,59,0.5) !important; }

/* Botão com logos */
#btn-logos {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 6px;
  width: 100%;
  height: 100%;
}

#btn-logos img {
  max-width: 120px;
  max-height: 55px;
  object-fit: contain;
  display: block;
}
.logos-divider {
  width:60px; height:1px; background:#e0e0e0;
}
  </style>
</head>

  const value = e?.target?.value ?? "";
  const index = e?.target?.id?.split("-")[1];
  defaultItems.splice(index, 1, { ...defaultItems[index], text: value });
}
function addInputsChangeListener() {
  const inputs = $(".inputs-awards");
  for (let i = 0; i < inputs.length; i++) {
    inputs[i]?.addEventListener("keyup",  callbackInputChange);
    inputs[i]?.addEventListener("change", callbackInputChange);
  }
}
function removeInputsChangeListener() {
  const inputs = $(".inputs-awards");
  for (let i = 0; i < inputs.length; i++) {
    inputs[i]?.removeEventListener("keyup",  callbackInputChange);
    inputs[i]?.removeEventListener("change", callbackInputChange);
  }
}

function setItems() {
  const divItems = $("#awards");
  divItems.html("");
  removeInputsChangeListener();
  for (let index = 0; index < defaultItems.length; index++) {
    const item = defaultItems[index];
    if (item.type === "replay") continue;
    const itemDiv = `
    <div class="sm:col-span-full flex justify-between w-full gap-2">
      <div class="w-full">
        <input type="text" value="${item.text}" id="item-${index}"
          class="inputs-awards block w-full rounded-md border-0 p-4 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6"/>
      </div>
      ${index !== 0 ? `<button onclick="handleDeleteButton(${index})" type="button"
        class="delete rounded-md bg-red-600 p-2 text-sm font-semibold text-white shadow-sm hover:bg-red-500"><i class="material-icons">delete</i></button>` : ""}
      ${index === defaultItems.length - 2 ? `<button onclick="handleAddButton()" type="button"
        class="rounded-md bg-indigo-600 p-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500"><i class="material-icons">add</i></button>` : ""}
    </div>`;
    divItems.html(divItems.html() + itemDiv);
  }
  addInputsChangeListener();
}

function handleDeleteButton(index) {
  defaultItems.splice(parseInt(index, 10), 1);
  setItems();
}
function handleAddButton() {
  defaultItems.splice(defaultItems.length - 1, 0, defaultItem);
  setItems();
}
getItems();
function handleSaveButton() {
  window.localStorage.setItem("defaultItems", JSON.stringify(defaultItems));
  getItems();
  handleToggleModalForm();
  window.location.reload();
}
function handleMenu() {
  const menu = document.getElementById("menu");
  menu.classList.toggle("hidden");
}
  </script>

  <!-- ===================== roulette.js ===================== -->
  <script>
var data = defaultItems;

var RouletteWheel = function(el, items) {
  this.$el    = $(el);
  this.items  = items || [];
  this._bis   = false;
  this._angle = 0;
  this._index = 0;
  this.options = { angleOffset: -90 };
};

_.extend(RouletteWheel.prototype, Backbone.Events);

RouletteWheel.prototype.spin = function(_index) {
  var count = this.items.length;
  var delta = 360 / count;
  var index = !isNaN(parseInt(_index)) ? parseInt(_index) : parseInt(Math.random() * count);
  var a = index * delta + (this._bis ? 1440 : -1440);
  this._bis   = !this._bis;
  this._angle = a;
  this._index = index;
  var $spinner = $(this.$el.find(".spinner"));
  var _onAnimationBegin = function() { this.$el.addClass("busy"); this.trigger("spin:start", this); };
  var _onAnimationComplete = function() { this.$el.removeClass("busy"); this.trigger("spin:end", this); };
  $spinner.velocity("stop").velocity({ rotateZ: a + "deg" }, {
    easing: "easeOutQuint", duration: 5000,
    begin:    $.proxy(_onAnimationBegin, this),
    complete: $.proxy(_onAnimationComplete, this),
  });
};

RouletteWheel.prototype.render = function() {
  var $spinner = $(this.$el.find(".spinner"));
  var D = this.$el.width();
  var R = D * 0.5;
  var count = this.items.length;
  var delta = 360 / count;
  var colors = ["#D81B60", "#1565C0", "#2E7D32", "#6A1B9A", "#AD1457", "#F57F17", "#00695C", "#B71C1C", "#E65100", "#558B2F", "#4527A0", "#006064", "#1A237E", "#880E4F", "#0277BD", "#33691E", "#F9A825"];
  for (var i = 0; i < count; i++) {
    var item  = this.items[i];
    var color = item.type !== "replay" ? (item.type !== "end" ? colors[i % colors.length] : "#76bc21") : "#ffc000";
    var text  = item.text;
    var ikon  = item.ikon;
    var html  = [];
    html.push('<div class="item" data-index="' + i + '" data-type="' + item.type + '">');
    html.push('<span class="label">');
    if (ikon) html.push('<i class="material-icons">' + ikon + '</i>');
    html.push('<span class="text">' + text + '</span>');
    html.push('</span></div>');
    var $item = $(html.join(""));
    var borderTopWidth   = D + D * 0.0025;
    var deltaInRadians   = (delta * Math.PI) / 180;
    var borderRightWidth = D / (1 / Math.tan(deltaInRadians));
    var r = delta * (count - i) + this.options.angleOffset - delta * 0.5;
    $item.css({ borderTopWidth: borderTopWidth, borderRightWidth: borderRightWidth, transform: "scale(2) rotate(" + r + "deg)", borderTopColor: color });
    var textHeight = parseInt(((2 * Math.PI * R) / count) * 0.5);
    $item.find(".label").css({
      transform: "translateY(" + D * -0.25 + "px) translateX(" + textHeight * 1.03 + "px) rotateZ(" + (90 + delta * 0.5) + "deg)",
      height: textHeight + "px", lineHeight: textHeight + "px", textIndent: R * 0.1 + "px"
    });
    $spinner.append($item);
  }
  $spinner.css({ fontSize: parseInt(R * 0.06) + "px" });
};

RouletteWheel.prototype.bindEvents = function() {
  this.$el.find(".button").on("click", $.proxy(this.spin, this));
};

var spinner;
$(window).ready(function() {
  spinner = new RouletteWheel($(".roulette"), data);
  spinner.render();
  spinner.bindEvents();
  spinner.on("spin:end", function(r) {
    Swal.fire({
      position: "center",
      icon:  data[r._index].type === "replay" ? "warning" : data[r._index].type === "end" ? "error" : "success",
      title: data[r._index].type === "replay" ? "Gire outra vez!" : data[r._index].type === "end" ? "Não foi dessa vez!" : `Parabéns! Você acaba de ganhar: ${data[r._index].text}!`,
      showConfirmButton: true,
      timer: 5000,
    });
  });
});
  </script>

  <script>
function fileDownloader(filename = "roulette.json", mime, bom) {
  let d = JSON.stringify(defaultItems);
  var blobData = typeof bom !== "undefined" ? [bom, d] : [d];
  var blob = new Blob(blobData, { type: mime || "application/octet-stream" });
  if (typeof window.navigator.msSaveBlob !== "undefined") {
    window.navigator.msSaveBlob(blob, filename);
  } else {
    var blobURL = window.URL && window.URL.createObjectURL ? window.URL.createObjectURL(blob) : window.webkitURL.createObjectURL(blob);
    var tempLink = document.createElement("a");
    tempLink.style.display = "none"; tempLink.href = blobURL;
    tempLink.setAttribute("download", filename);
    if (typeof tempLink.download === "undefined") tempLink.setAttribute("target", "_blank");
    document.body.appendChild(tempLink); tempLink.click();
    setTimeout(function() { document.body.removeChild(tempLink); window.URL.revokeObjectURL(blobURL); }, 200);
  }
}

function importJson() {
  const interval = setInterval(() => {
    const fileUpload = document.getElementById("file-upload");
    if (fileUpload) {
      fileUpload.addEventListener("change", (e) => {
        const file = e?.target?.files?.[0];
        if (file) {
          const reader = new FileReader();
          reader.addEventListener("load", (event) => {
            const result = event.target.result;
            const splittedResult = result.split(",");
            const json = splittedResult[splittedResult.length - 1];
            window.localStorage.setItem("defaultItems", decodeURIComponent(escape(window.atob(json))));
          });
          reader.readAsDataURL(file);
        }
        window.location.reload();
      });
      clearInterval(interval);
    }
  }, 200);
}
importJson();
  </script>
