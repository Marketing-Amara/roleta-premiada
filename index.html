<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roleta Premiada</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f1f1f1;
    min-height:100vh;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    overflow:hidden;
}

/* BOTÃO ALTERAR */

.topbar{
    position:absolute;
    top:25px;
    left:25px;
}

.alterar-btn{
    background:#fff;
    border:none;

    padding:14px 26px;

    border-radius:14px;

    font-size:18px;
    font-weight:600;

    color:#2ea84a;

    cursor:pointer;

    box-shadow:0 4px 12px rgba(0,0,0,.12);
}

/* TITULO */

h1{
    color:#18873a;

    text-align:center;

    margin-bottom:30px;

    line-height:1.05;
}

h1 span{
    font-size:90px;
    font-weight:800;
}

h1 small{
    font-size:70px;
    font-weight:300;
}

/* ROLETA */

.wheel-wrapper{
    position:relative;

    width:760px;
    height:760px;
}

.pointer{
    position:absolute;

    top:-5px;
    left:50%;

    transform:translateX(-50%);

    width:0;
    height:0;

    border-left:30px solid transparent;
    border-right:30px solid transparent;
    border-top:60px solid #fff;

    z-index:10;

    filter:drop-shadow(0 4px 4px rgba(0,0,0,.15));
}

.wheel{
    width:100%;
    height:100%;

    border-radius:50%;

    border:14px solid #fff;

    position:relative;

    overflow:hidden;

    transition:transform 5s cubic-bezier(0.17, 0.67, 0.12, 0.99);

    box-shadow:0 12px 30px rgba(0,0,0,.18);

    background: conic-gradient(
        #1fa63b 0deg 21deg,
        #c0d61b 21deg 42deg,
        #8cc61e 42deg 63deg,
        #1fa63b 63deg 84deg,
        #c0d61b 84deg 105deg,
        #f2c228 105deg 126deg,
        #8cc61e 126deg 147deg,
        #c0d61b 147deg 168deg,
        #1fa63b 168deg 189deg,
        #8cc61e 189deg 210deg,
        #c0d61b 210deg 231deg,
        #1fa63b 231deg 252deg,
        #8cc61e 252deg 273deg,
        #c0d61b 273deg 294deg,
        #1fa63b 294deg 315deg,
        #8cc61e 315deg 336deg,
        #c0d61b 336deg 360deg
    );
}

/* TEXTOS */

.label{
    position:absolute;

    width:125px;

    left:50%;
    top:50%;

    transform-origin:0 0;

    color:#fff;

    font-size:13px;
    font-weight:700;

    text-align:center;

    line-height:1.2;

    text-shadow:1px 1px 2px rgba(0,0,0,.35);
}

/* CENTRO */

.center{
    position:absolute;

    width:250px;
    height:250px;

    background:#fff;

    border-radius:50%;

    top:50%;
    left:50%;

    transform:translate(-50%, -50%);

    z-index:5;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    gap:20px;

    border:10px solid #f4f4f4;

    box-shadow:0 0 15px rgba(0,0,0,.08);
}

/* LOGOS */

.logo-guanambi{
    width:130px;
    object-fit:contain;
}

.logo-amara{
    width:180px;
    object-fit:contain;
}

/* BOTÃO GIRAR NO MEIO */

.spin-button{
    position:absolute;

    inset:0;

    margin:auto;

    width:250px;
    height:250px;

    border-radius:50%;

    border:none;

    background:transparent;

    z-index:20;

    cursor:pointer;
}

/* RESULTADO */

.result{
    margin-top:30px;

    font-size:28px;
    font-weight:700;

    color:#18873a;
}

</style>
</head>

<body>

<div class="topbar">
    <button class="alterar-btn" onclick="editarPremios()">
        ✏️ Alterar
    </button>
</div>

<h1>
    <small>Fechou?</small><br>
    <span>Rode a roleta!</span>
</h1>

<div class="wheel-wrapper">

    <div class="pointer"></div>

    <div class="wheel" id="wheel"></div>

    <div class="center">

        <!-- GUANAMBI EM CIMA -->
        <img
            src="guanambi-sem-fundo.png"
            class="logo-guanambi"
        >

        <!-- AMARA EMBAIXO -->
        <img
            src="amara.png"
            class="logo-amara"
        >

    </div>

    <!-- BOTÃO INVISÍVEL NO CENTRO -->
    <button class="spin-button" onclick="girar()"></button>

</div>

<div class="result" id="resultado"></div>

<script>

let premios = JSON.parse(localStorage.getItem('premios')) || [

    "2 Últimas Parcelas Pagas",
    "JBL Caixa de Som",
    "R$ 300 PARA GASTAR NA EXPO",
    "Lavadora WAP de Alta Pressão",
    "R$ 300 PARA GASTAR NA EXPO",
    "Vale de R$ 500",
    "R$ 400 PARA GASTAR NA EXPO",
    "Cafeteira",
    "Última Parcela Paga",
    "Panela de Pressão Elétrica 5L",
    "R$ 200 PARA GASTAR NA EXPO",
    "Ar Condicionado 12 Mil BTUs",
    "R$ 300 PARA GASTAR NA EXPO",
    "Air Fryer Mondial 12L",
    "GIRE NOVAMENTE!",
    "R$ 100,00",
    "R$ 100,00"

];

const wheel = document.getElementById("wheel");

function renderizarRoleta(){

    wheel.innerHTML = "";

    const total = premios.length;

    const angulo = 360 / total;

    premios.forEach((premio, i) => {

        const label = document.createElement("div");

        label.className = "label";

        label.style.transform =
        `
        rotate(${angulo * i + angulo/2}deg)
        translate(255px)
        rotate(90deg)
        `;

        label.innerHTML = premio;

        wheel.appendChild(label);

    });

}

renderizarRoleta();

let girando = false;

let rotacao = 0;

function girar(){

    if(girando || premios.length === 0) return;

    girando = true;

    const indice = Math.floor(Math.random() * premios.length);

    const premio = premios[indice];

    const angulo = 360 / premios.length;

    const parada =
        (360 * 6) +
        (360 - (indice * angulo) - angulo/2);

    rotacao += parada;

    wheel.style.transform = `rotate(${rotacao}deg)`;

    setTimeout(() => {

        document.getElementById("resultado").innerHTML =
        `🎉 Resultado: ${premio}`;

        /* REMOVE O PRÊMIO */

        premios.splice(indice, 1);

        localStorage.setItem(
            "premios",
            JSON.stringify(premios)
        );

        renderizarRoleta();

        girando = false;

    }, 5200);

}

function editarPremios(){

    const listaAtual = premios.join("\n");

    const novaLista = prompt(
`Edite os prêmios abaixo (1 por linha):`,
listaAtual
    );

    if(novaLista !== null){

        premios = novaLista
            .split("\n")
            .map(p => p.trim())
            .filter(p => p !== "");

        localStorage.setItem(
            "premios",
            JSON.stringify(premios)
        );

        renderizarRoleta();

    }

}

</script>

</body>
</html>
